name: Daily Email Automation Dubai Companies

on:
  schedule:
    # Runs every day at 10:00 AM UTC (2:00 PM Dubai time)
    - cron: '0 12 * * *'
  # Manual trigger from GitHub UI
  workflow_dispatch:
  # Runs when you push to main (for testing)
  push:
    branches: [ master ]

jobs:
  send-emails:
    runs-on: ubuntu-latest
    
    # ✅ CRITICAL: Give write permission to push progress
    permissions:
      contents: write
    
    # Optional: Silence Node.js warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl
    
    - name: Send daily email batch
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        python email_automation2.py
    
    - name: Upload progress files (backup)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: email-progress-${{ github.run_id }}
        path: |
          send_progress2.json
          email_sending_log2.txt
          failed_batch2_*.xlsx
        retention-days: 30
    
    - name: Commit and push progress
      if: always()
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Use PAT token instead of GITHUB_TOKEN
        git remote set-url origin https://stupidestbrokeguy:${PAT_TOKEN}@github.com/stupidestbrokeguy/email-automation.git
        
        git pull origin master --no-rebase || true
        git add send_progress2.json email_sending_log2.txt 2>/dev/null || true
        
        if ! git diff --cached --quiet; then
          git commit -m "Update emails [skip ci]"
          git push origin HEAD:master
          echo "✅ Progress pushed successfully!"
        else
          echo "ℹ️ No changes to commit"
        fi
