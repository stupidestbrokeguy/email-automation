name: Daily Affirmation - 30 Second Clip

on:
  schedule:
    # Run at 7:00 AM Dubai time (UTC+4) = 3:00 UTC
    - cron: '3 3 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD)'
        required: false
        default: '2026-06-01'
        type: string

jobs:
  send-affirmation:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Install ImageMagick (for text overlays)
      run: |
        sudo apt-get install -y imagemagick
        # Fix ImageMagick policy for text rendering
        sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
    
    - name: Create client_secrets.json from secret
      run: |
        echo '${{ secrets.CLIENT_SECRETS_JSON }}' > client_secrets.json
        echo "✅ client_secrets.json created"
    
    - name: Decode token from secret
      run: |
        echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > token.pickle
        echo "✅ token.pickle restored"
    
    - name: Download background music (optional)
      run: |
        if [ ! -f background_music.mp3 ]; then
          echo "⚠️ No background_music.mp3 found - video will be silent"
        fi
    
    - name: Verify PDF exists
      run: |
        if [ ! -f your_document.pdf ]; then
          echo "❌ PDF file not found!"
          exit 1
        fi
        echo "✅ PDF file found ($(du -h your_document.pdf | cut -f1))"
    
    - name: Find available date in PDF
      id: find_date
      run: |
        # If manual date provided and after May 31, use it
        if [ -n "${{ github.event.inputs.target_date }}" ] && [ "${{ github.event.inputs.target_date }}" != "" ]; then
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          echo "date=${TARGET_DATE}" >> $GITHUB_OUTPUT
          echo "📅 Using manual date: ${TARGET_DATE}"
        else
          # Get current date
          CURRENT_DATE=$(date +'%Y-%m-%d')
          CURRENT_MONTH=$(date +'%m')
          CURRENT_DAY=$(date +'%d')
          CURRENT_YEAR=$(date +'%Y')
          
          # If before June 1, 2026, start from June 1
          if [[ "$CURRENT_DATE" < "2026-06-01" ]]; then
            echo "📅 Current date ($CURRENT_DATE) is before PDF content starts"
            echo "📅 Starting from June 1, 2026"
            echo "date=2026-06-01" >> $GITHUB_OUTPUT
          elif [[ "$CURRENT_DATE" > "2026-06-30" ]]; then
            # If after June 30, loop back to June 1 or stop
            echo "📅 Current date ($CURRENT_DATE) is after PDF content ends"
            echo "📅 Starting from June 1, 2026"
            echo "date=2026-06-01" >> $GITHUB_OUTPUT
          else
            echo "date=${CURRENT_DATE}" >> $GITHUB_OUTPUT
            echo "📅 Using today's date: ${CURRENT_DATE}"
          fi
        fi
    
    - name: Run Affirmation script
      run: |
        echo "🎬 Processing date: ${{ steps.find_date.outputs.date }}"
        python affirmation_extractor.py ${{ steps.find_date.outputs.date }}
    
    - name: Upload video as artifact
      uses: actions/upload-artifact@v4
      with:
        name: affirmation-30s-video
        path: affirmation_pages/*_affirmation_30s.mp4
        retention-days: 30
      if: always()
    
    - name: Upload affirmation text as artifact
      uses: actions/upload-artifact@v4
      with:
        name: affirmation-text
        path: affirmation_pages/*.txt
        retention-days: 30
      if: always()
    
    - name: Log completion
      run: |
        echo "✅ Daily affirmation processing complete!"
        echo "📹 Check YouTube channel for the 30-second affirmation clip"
