name: Daily Email Automation

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  send-emails:
    runs-on: ubuntu-latest
    
    # ✅ THIS IS THE KEY FIX - Give write permissions
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl
        
    - name: Send daily email batch
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        python email_automation.py
        
    - name: Upload progress files
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: email-progress-logs-${{ github.run_id }}
        path: |
          send_progress.json
          email_sending_log.txt
          *.xlsx
        retention-days: 30
        
    - name: Commit and push progress
      if: always()
      run: |
        # Configure git
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Pull latest changes first
        git pull origin main --rebase || true
        
        # Add progress files
        git add send_progress.json email_sending_log.txt 2>/dev/null || true
        
        # Check if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          # Commit changes
          git commit -m "Update email progress - Batch completed [skip ci]"
          
          # Push using GITHUB_TOKEN
          git push origin HEAD:main
          echo "✅ Progress committed and pushed!"
        fi
