name: Daily Creative Daily YouTube Upload

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:  # Enable manual trigger for testing
  # push:
  #   branches: [ main, master ]

jobs:
  send-creativedaily:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Decode and create client_secrets.json
      run: |
        if [ -z "${{ secrets.CLIENT_SECRETS_JSON }}" ]; then
          echo "❌ ERROR: CLIENT_SECRETS_JSON secret is missing!"
          exit 1
        fi
        echo "${{ secrets.CLIENT_SECRETS_JSON }}" | base64 -d > client_secrets.json
        echo "✅ client_secrets.json created ($(wc -c < client_secrets.json) bytes)"
    
    - name: Decode and create token.pickle
      run: |
        if [ -z "${{ secrets.YOUTUBE_TOKEN }}" ]; then
          echo "❌ ERROR: YOUTUBE_TOKEN secret is missing!"
          exit 1
        fi
        echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > token.pickle
        echo "✅ token.pickle restored ($(wc -c < token.pickle) bytes)"
    
    - name: Verify PDF exists
      run: |
        # Update this to your actual PDF filename
        PDF_FILE="your_document.pdf"  # ← CHANGE THIS TO YOUR PDF NAME
        if [ ! -f "$PDF_FILE" ]; then
          echo "❌ PDF file '$PDF_FILE' not found!"
          echo "📁 Available files:"
          ls -la
          exit 1
        fi
        echo "✅ PDF file found: $PDF_FILE ($(du -h $PDF_FILE | cut -f1))"
    
    - name: List directory contents (debug)
      run: |
        echo "📁 Current directory contents:"
        ls -la
        echo ""
        echo "📁 Python files:"
        ls -la *.py 2>/dev/null || echo "No Python files found in root"
    
    - name: Run Creative Daily script
      run: |
        TODAY=$(date +'%Y-%m-%d')
        echo "📅 Processing date: $TODAY"
        python check.py 2026-06-09
      env:
        # Pass as environment variables for debugging
        PYTHONUNBUFFERED: 1
    
    - name: Upload video as artifact
      if: always()  # Upload even if script fails
      uses: actions/upload-artifact@v4
      with:
        name: creative-daily-video
        path: extracted_date_pages/*.mp4
        retention-days: 30
    
    - name: Upload logs if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs
        path: |
          *.log
          extracted_date_pages/*.txt
        retention-days: 7
