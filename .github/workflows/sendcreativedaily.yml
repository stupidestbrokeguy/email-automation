name: Daily Creative Daily YouTube Upload

on:
  schedule:
    # Runs every day at 6:00 AM UTC (10:00 AM Dubai time - UTC+4)
    - cron: '0 6 * * *'
  
  # Manual trigger from GitHub UI
  workflow_dispatch:
  
  # Runs when you push to main (for testing)
  push:
    branches: [ main, master ]

jobs:
  send-creativedaily:
    runs-on: ubuntu-latest
    
    # Give write permission to push progress
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow
    
    - name: Install FFmpeg (required for moviepy)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Create client_secrets.json from secret
      run: |
        echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
        echo "✅ client_secrets.json created"
    
    - name: List files for debugging
      run: |
        ls -la
        echo "📁 Current directory contents:"
        ls -la
    
    - name: Send daily creative daily
      env:
        YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        TARGET_DATE: ${{ github.event.schedule && 'today' || inputs.date }}
      run: |
        # Get today's date in YYYY-MM-DD format
        TODAY=$(date +'%Y-%m-%d')
        echo "📅 Processing date: $TODAY"
        python check.py $TODAY
