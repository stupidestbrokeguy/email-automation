name: Send Creative Daily

on:
  schedule:
    # Runs every day at 6:00 AM UTC (10:00 AM Dubai time)
    - cron: '0 6 * * *'
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD) - leave empty for today'
        required: false
        type: string
        default: ''
      no_youtube:
        description: 'Skip YouTube upload'
        required: false
        type: boolean
        default: false
      duration:
        description: 'Video duration in seconds (17-21 recommended)'
        required: false
        type: number
        default: 18

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Decode and create client_secrets.json
      run: |
        if [ -z "${{ secrets.CLIENT_SECRETS_JSON }}" ]; then
          echo "⚠️ No CLIENT_SECRETS_JSON secret found - YouTube upload will be skipped"
        else
          echo "${{ secrets.CLIENT_SECRETS_JSON }}" | base64 -d > client_secrets.json
          echo "✅ client_secrets.json created"
        fi
    
    - name: Decode and create token.pickle
      run: |
        if [ -n "${{ secrets.YOUTUBE_TOKEN }}" ]; then
          echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > token.pickle
          echo "✅ token.pickle restored"
        else
          echo "⚠️ No token.pickle secret found - will need manual auth"
        fi
    
    - name: Setup PDF file
      run: |
        echo "🔍 Setting up PDF file..."
        
        # Find any PDF file
        if [ -f "your_document.pdf" ]; then
          echo "✅ Found PDF: your_document.pdf"
          ls -la your_document.pdf
          
          # Check PDF page count
          python -c "
import fitz
try:
    doc = fitz.open('your_document.pdf')
    print(f'📄 PDF has {len(doc)} pages')
    if len(doc) == 0:
        print('❌ PDF has no pages!')
        exit(1)
    doc.close()
except Exception as e:
    print(f'❌ Error reading PDF: {e}')
    exit(1)
"
        else
          echo "❌ your_document.pdf not found!"
          echo "Available files:"
          ls -la
          exit 1
        fi
    
    - name: Run Creative Daily script
      id: creative_daily
      run: |
        # Get date from input or use today
        if [ -n "${{ github.event.inputs.target_date }}" ] && [ "${{ github.event.inputs.target_date }}" != "" ]; then
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          echo "🎯 Using custom date: $TARGET_DATE"
        else
          TARGET_DATE=$(date +%Y-%m-%d)
          echo "📅 Using today's date: $TARGET_DATE"
        fi
        
        # Build command
        COMMAND="python check.py"
        
        # Add date parameter
        COMMAND="$COMMAND $TARGET_DATE"
        
        # Add no-youtube flag
        if [ "${{ github.event.inputs.no_youtube }}" = "true" ]; then
          COMMAND="$COMMAND --no-youtube"
          echo "📹 YouTube upload disabled"
        fi
        
        # Add duration
        DURATION="${{ github.event.inputs.duration }}"
        if [ -n "$DURATION" ] && [ "$DURATION" != "null" ]; then
          COMMAND="$COMMAND --duration=$DURATION"
          echo "⏱️ Using duration: ${DURATION}s"
        fi
        
        echo "========================================"
        echo "🚀 Executing: $COMMAND"
        echo "========================================"
        
        # Execute the command
        $COMMAND
        EXIT_CODE=$?
        
        if [ $EXIT_CODE -ne 0 ]; then
          echo "❌ Script failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi
        
        # Save video info if created
        if [ -d "extracted_date_pages" ]; then
          VIDEO_FILE=$(ls extracted_date_pages/*.mp4 2>/dev/null | head -1)
          if [ -n "$VIDEO_FILE" ]; then
            echo "video_file=$VIDEO_FILE" >> $GITHUB_OUTPUT
            echo "✅ Video created: $VIDEO_FILE"
          fi
          
          # Save YouTube URL if exists
          for file in extracted_date_pages/*.mp4; do
            if [ -f "$file" ]; then
              echo "video_path=$file" >> $GITHUB_OUTPUT
            fi
          done
        fi
      env:
        PYTHONUNBUFFERED: 1
    
    - name: Upload video as artifact
      if: always() && (success() || failure())
      uses: actions/upload-artifact@v4
      with:
        name: creative-daily-video-${{ github.run_id }}
        path: extracted_date_pages/*.mp4
        retention-days: 30
    
    - name: Upload images as artifact
      if: always() && (success() || failure())
      uses: actions/upload-artifact@v4
      with:
        name: extracted-images-${{ github.run_id }}
        path: extracted_date_pages/*.png
        retention-days: 30
    
    - name: Upload all outputs
      if: always() && (success() || failure())
      uses: actions/upload-artifact@v4
      with:
        name: creative-daily-outputs-${{ github.run_id }}
        path: |
          extracted_date_pages/
          *.log
          *.txt
        retention-days: 14
    
    - name: Save updated token.pickle
      if: success() && github.event.inputs.no_youtube != 'true'
      run: |
        if [ -f "token.pickle" ]; then
          ENCODED_TOKEN=$(base64 -w 0 token.pickle 2>/dev/null || base64 token.pickle | tr -d '\n')
          echo "🔑 Token encoded (length: ${#ENCODED_TOKEN})"
          echo "💡 Update your YOUTUBE_TOKEN secret with this value"
        fi
    
    - name: Summary
      if: always()
      run: |
        echo "========================================"
        echo "📊 CREATIVE DAILY SUMMARY"
        echo "========================================"
        echo "Run ID: ${{ github.run_id }}"
        echo "Status: ${{ job.status }}"
        echo ""
        
        if [ -d "extracted_date_pages" ]; then
          echo "📁 extracted_date_pages/ contents:"
          ls -la extracted_date_pages/
          echo ""
          
          VIDEO_COUNT=$(ls extracted_date_pages/*.mp4 2>/dev/null | wc -l)
          IMAGE_COUNT=$(ls extracted_date_pages/*.png 2>/dev/null | wc -l)
          
          echo "✅ Video files: $VIDEO_COUNT"
          echo "✅ Image files: $IMAGE_COUNT"
        else
          echo "❌ No extracted_date_pages directory found"
          
          # List current directory for debugging
          echo ""
          echo "📁 Current directory contents:"
          ls -la
        fi
        echo "========================================"
    
    - name: Debug - Check files
      if: failure()
      run: |
        echo "🔍 DEBUG - Current directory:"
        pwd
        echo ""
        echo "🔍 DEBUG - All files:"
        ls -la
        echo ""
        echo "🔍 DEBUG - Check if check.py exists:"
        ls -la check.py 2>/dev/null || echo "check.py NOT found!"
        echo ""
        echo "🔍 DEBUG - Check if PDF exists:"
        ls -la *.pdf 2>/dev/null || echo "No PDF files found!"
