name: Creative Daily YouTube Upload

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD) - leave empty for today'
        required: false
        type: string
        default: ''
      no_youtube:
        description: 'Skip YouTube upload'
        required: false
        type: boolean
        default: false
      duration:
        description: 'Video duration in seconds'
        required: false
        type: number
        default: 18

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Decode client_secrets.json
      run: |
        if [ -z "${{ secrets.CLIENT_SECRETS_JSON }}" ]; then
          echo "⚠️ No CLIENT_SECRETS_JSON secret found"
        else
          echo "${{ secrets.CLIENT_SECRETS_JSON }}" | base64 -d > client_secrets.json
          echo "✅ client_secrets.json created"
        fi
    
    - name: Decode token.pickle
      run: |
        if [ -n "${{ secrets.YOUTUBE_TOKEN }}" ]; then
          echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > token.pickle
          echo "✅ token.pickle restored"
        fi
    
    - name: Setup PDF
      run: |
        if [ -f "your_document.pdf" ]; then
          echo "✅ Found PDF: your_document.pdf"
          ls -la your_document.pdf
        else
          echo "❌ your_document.pdf not found!"
          exit 1
        fi
    
    - name: Run Creative Daily
      run: |
        if [ -n "${{ github.event.inputs.target_date }}" ] && [ "${{ github.event.inputs.target_date }}" != "" ]; then
          TARGET_DATE="${{ github.event.inputs.target_date }}"
        else
          TARGET_DATE=$(date +%Y-%m-%d)
        fi
        
        CMD="python check.py $TARGET_DATE"
        
        if [ "${{ github.event.inputs.no_youtube }}" = "true" ]; then
          CMD="$CMD --no-youtube"
        fi
        
        if [ -n "${{ github.event.inputs.duration }}" ] && [ "${{ github.event.inputs.duration }}" != "" ]; then
          CMD="$CMD --duration=${{ github.event.inputs.duration }}"
        fi
        
        echo "🚀 Running: $CMD"
        $CMD
      env:
        PYTHONUNBUFFERED: 1
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: creative-daily-outputs
        path: extracted_date_pages/
        retention-days: 30
