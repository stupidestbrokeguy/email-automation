name: Daily Creative Daily YouTube Upload

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  send-creativedaily:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Create client_secrets.json from secret
      run: |
        echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
        echo "✅ client_secrets.json created"
    
    - name: Decode token from secret
      run: |
        echo "${{ secrets.YOUTUBE_TOKEN_BASE64 }}" | base64 -d > token.pickle
        echo "✅ token.pickle restored"
        ls -la token.pickle
    
    - name: Verify PDF exists
      run: |
        ls -la your_document.pdf
        if [ ! -s your_document.pdf ]; then
          echo "❌ PDF file is empty!"
          exit 1
        fi
        echo "✅ PDF file is valid"
    
    - name: Run Creative Daily script
      run: |
        TODAY=$(date +'%Y-%m-%d')
        echo "📅 Processing date: $TODAY"
        python check.py 2026-06-06
