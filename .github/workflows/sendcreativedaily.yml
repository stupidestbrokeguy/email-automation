name: Creative Daily YouTube Upload

on:
  schedule:
    # Runs every day at 6:00 AM UTC (10:00 AM Dubai time)
    - cron: '0 6 * * *'
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD) - leave empty for today'
        required: false
        type: string
      no_youtube:
        description: 'Skip YouTube upload'
        required: false
        type: boolean
        default: false
      duration:
        description: 'Video duration in seconds'
        required: false
        type: number
        default: 18

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Decode and create client_secrets.json
      run: |
        if [ -z "${{ secrets.CLIENT_SECRETS_JSON }}" ]; then
          echo "❌ ERROR: CLIENT_SECRETS_JSON secret is missing!"
          exit 1
        fi
        echo "${{ secrets.CLIENT_SECRETS_JSON }}" | base64 -d > client_secrets.json
        echo "✅ client_secrets.json created"
    
    - name: Decode and create token.pickle
      run: |
        if [ -n "${{ secrets.YOUTUBE_TOKEN }}" ]; then
          echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > token.pickle
          echo "✅ token.pickle restored"
        else
          echo "⚠️ No token.pickle secret found - will need manual auth"
        fi
    
    - name: Setup PDF file
      run: |
        echo "🔍 Setting up PDF file..."
        
        # Use your_document.pdf directly
        if [ -f "your_document.pdf" ]; then
          echo "✅ Found PDF: your_document.pdf"
          ls -la your_document.pdf
        else
          echo "❌ your_document.pdf not found!"
          ls -la *.pdf 2>/dev/null || echo "No PDFs in directory"
          exit 1
        fi
    
    - name: Run Creative Daily script
      id: creative_daily
      run: |
        # Get actual today's date from system
        TODAY=$(date +%Y-%m-%d)
        echo "📅 Today's date: $TODAY"
        
        # Get input values
        TARGET_DATE="${{ github.event.inputs.target_date }}"
        NO_YOUTUBE="${{ github.event.inputs.no_youtube }}"
        DURATION="${{ github.event.inputs.duration }}"
        
        # Build command
        COMMAND="python check.py"
        
        # Calculate the day number from June 1, 2026
        START_DATE="2026-06-01"
        CURRENT_DATE="${TARGET_DATE:-$TODAY}"
        
        # Calculate days since June 1, 2026
        DAYS_SINCE=$(python -c "
from datetime import datetime
start = datetime.strptime('$START_DATE', '%Y-%m-%d')
current = datetime.strptime('$CURRENT_DATE', '%Y-%m-%d')
diff = (current - start).days
if diff < 0:
    print(0)
elif diff >= 37:
    print(36)  # Cap at 37 days (index 0-36)
else:
    print(diff)
")
        
        echo "📊 Day number: $DAYS_SINCE (0-indexed, Day 1 = June 1)"
        
        # Add date parameter
        if [ -n "$TARGET_DATE" ] && [ "$TARGET_DATE" != "null" ]; then
          COMMAND="$COMMAND $TARGET_DATE"
          echo "🎯 Using custom date: $TARGET_DATE"
        else
          COMMAND="$COMMAND $TODAY"
          echo "📅 Using today's date: $TODAY"
        fi
        
        # Add no-youtube flag
        if [ "$NO_YOUTUBE" = "true" ]; then
          COMMAND="$COMMAND --no-youtube"
          echo "📹 YouTube upload disabled"
        fi
        
        # Add duration
        if [ -n "$DURATION" ] && [ "$DURATION" != "null" ]; then
          COMMAND="$COMMAND --duration=$DURATION"
          echo "⏱️ Using duration: ${DURATION}s"
        fi
        
        echo "========================================"
        echo "🚀 Executing: $COMMAND"
        echo "========================================"
        
        # Execute the command
        $COMMAND
        
        # Save video info if created
        if [ -d "extracted_date_pages" ]; then
          VIDEO_FILE=$(ls extracted_date_pages/*.mp4 2>/dev/null | head -1)
          if [ -n "$VIDEO_FILE" ]; then
            echo "video_file=$VIDEO_FILE" >> $GITHUB_OUTPUT
            echo "✅ Video created: $VIDEO_FILE"
          fi
        fi
      env:
        PYTHONUNBUFFERED: 1
    
    - name: Upload video as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: creative-daily-video-${{ github.run_id }}
        path: extracted_date_pages/*.mp4
        retention-days: 30
    
    - name: Upload images as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: extracted-images-${{ github.run_id }}
        path: extracted_date_pages/*.png
        retention-days: 30
    
    - name: Upload all outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: creative-daily-outputs-${{ github.run_id }}
        path: |
          extracted_date_pages/
          *.log
        retention-days: 14
    
    - name: Save updated token.pickle
      if: success()
      run: |
        if [ -f "token.pickle" ]; then
          echo "📝 token.pickle exists - you may want to update your secret"
          echo "Run this locally to encode: base64 -w 0 token.pickle"
        fi
    
    - name: Summary
      if: always()
      run: |
        echo "========================================"
        echo "📊 CREATIVE DAILY SUMMARY"
        echo "========================================"
        echo "Run ID: ${{ github.run_id }}"
        echo "Status: ${{ job.status }}"
        echo ""
        
        if [ -d "extracted_date_pages" ]; then
          echo "📁 extracted_date_pages/ contents:"
          ls -la extracted_date_pages/
          echo ""
          
          VIDEO_COUNT=$(ls extracted_date_pages/*.mp4 2>/dev/null | wc -l)
          IMAGE_COUNT=$(ls extracted_date_pages/*.png 2>/dev/null | wc -l)
          
          echo "✅ Video files: $VIDEO_COUNT"
          echo "✅ Image files: $IMAGE_COUNT"
        else
          echo "❌ No extracted_date_pages directory found"
        fi
        echo "========================================"
