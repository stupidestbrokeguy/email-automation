name: Daily Creative Daily YouTube Upload

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to process (YYYY-MM-DD)'
        required: false
        default: ''
        type: string
  push:
    branches: [ main, master ]

jobs:
  send-creativedaily:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy scipy
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Create client_secrets.json from secret
      run: |
        echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
        echo "✅ client_secrets.json created"
    
    - name: Decode token from secret
      run: |
        echo "${{ secrets.YOUTUBE_TOKEN_BASE64 }}" | base64 -d > token.pickle
        echo "✅ token.pickle restored"
        ls -la token.pickle
    
    - name: Verify PDF exists
      run: |
        ls -la your_document.pdf
        if [ ! -s your_document.pdf ]; then
          echo "❌ PDF file is empty!"
          exit 1
        fi
        echo "✅ PDF file is valid"
    
    - name: Set target date
      id: date
      run: |
        if [ -n "${{ github.event.inputs.date }}" ]; then
          TARGET_DATE="${{ github.event.inputs.date }}"
        else
          TARGET_DATE=$(date +'%Y-%m-%d')
        fi
        echo "target_date=$TARGET_DATE" >> $GITHUB_OUTPUT
        echo "run_id=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
        echo "📅 Target date: $TARGET_DATE"
    
    - name: Run Creative Daily script
      run: |
        echo "📅 Processing date: ${{ steps.date.outputs.target_date }}"
        python check.py 2026-06-03
    
    - name: Upload all artifacts for this run
      uses: actions/upload-artifact@v4
      with:
        name: creative-daily-${{ steps.date.outputs.target_date }}-${{ steps.date.outputs.run_id }}
        path: |
          extracted_date_pages/
          *.log
        retention-days: 30
    
    - name: Upload video as separate artifact (easy access)
      uses: actions/upload-artifact@v4
      with:
        name: video-${{ steps.date.outputs.target_date }}
        path: extracted_date_pages/*.mp4
        retention-days: 30
    
    - name: Notify completion
      run: |
        echo "✅ Workflow completed for ${{ steps.date.outputs.target_date }}"
        echo "📹 Video saved in artifacts"
