
name: Daily YouTube Shorts

on:
  schedule:
    # Run daily at 9:00 AM UAE time (GMT+4)
    # 5:00 UTC = 9:00 UAE
    - cron: '0 5 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: List images folder
      run: |
        echo "📁 Checking images in daily_images folder:"
        if [ -d "daily_images" ]; then
          ls -la daily_images/
          echo "Number of images: $(ls -1 daily_images/ | wc -l)"
        else
          echo "❌ daily_images folder not found!"
          exit 1
        fi
    
    - name: Decode client secrets
      env:
        CLIENT_SECRETS_BASE64: ${{ secrets.CLIENT_SECRETS_BASE64 }}
      run: |
        echo "$CLIENT_SECRETS_BASE64" | base64 -d > client_secrets.json
        echo "✅ client_secrets.json created"
    
    - name: Decode token
      env:
        TOKEN_PICKLE_BASE64: ${{ secrets.TOKEN_PICKLE_BASE64 }}
      run: |
        echo "$TOKEN_PICKLE_BASE64" | base64 -d > token.pickle
        echo "✅ token.pickle restored"
    
    - name: Run daily shorts script
      id: shorts
      run: |
        python daily_shorts.py 2>&1 | tee output.log
    
    - name: Upload state and logs
      uses: actions/upload-artifact@v4
      with:
        name: shorts-output
        path: |
          shorts_state.json
          daily_images/*_shorts.mp4
          daily_images/*_thumbnail.png
          output.log
      if: always()
    
    - name: Send success notification
      if: success()
      run: |
        echo "✅ YouTube Shorts posted successfully!"
        echo "Check your YouTube channel for the new video"
    
    - name: Send failure notification
      if: failure()
      run: |
        echo "❌ YouTube Shorts upload failed!"
        echo "Check the workflow logs for details"
        exit 1
